# .cargo/config.toml
[target.x86_64-unknown-linux-gnu]
linker = "clang"
rustflags = ["-C", "link-arg=-fuse-ld=mold"]

[profile.dev]
opt-level = 1 # Keep some optimization even in debug mode for smooth simulation

[profile.release]
lto = true # Link-Time Optimization for maximum ant-speed
codegen-units = 1
